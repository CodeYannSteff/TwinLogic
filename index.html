<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chronos Guardian</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="error-display" style="position:fixed;top:0;left:0;right:0;color:#ff4444;background:#000a;font:12px monospace;padding:8px;display:none;z-index:9999;max-height:200px;overflow:auto;"></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var d = document.getElementById('error-display');
      d.style.display = 'block';
      d.innerHTML += '<div>' + msg + ' at ' + url + ':' + line + '</div>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.getElementById('error-display');
      d.style.display = 'block';
      d.innerHTML += '<div>Promise: ' + e.reason + '</div>';
    });
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
